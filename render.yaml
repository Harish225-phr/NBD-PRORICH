services:
  - type: web
    name: nbd-crm-api
    runtime: python
    runtimeVersion: 3.13.1
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --timeout-keep-alive 120 --timeout-notify 120 --limit-concurrency 1000 --limit-max-requests 10000 --ws-max-size 16777216
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.1
